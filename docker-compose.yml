services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      sh -c "python -m alembic upgrade head &&
             gunicorn backend.app.main:app
             -k uvicorn.workers.UvicornWorker
             -b 0.0.0.0:8001
             --workers 2
             --timeout 120"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/v2/health', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped
