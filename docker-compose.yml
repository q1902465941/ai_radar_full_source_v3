services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    command:
      - sh
      - -c
      - python -m alembic upgrade head && exec gunicorn backend.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8001 --workers 2 --timeout 120
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8001
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/state', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  api-v2:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    command:
      - sh
      - -c
      - exec gunicorn backend.app.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8002 --workers 2 --timeout 120
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8002
    ports:
      - "8002:8002"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/api/v2/health', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:24-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.29-alpine}
    depends_on:
      backend:
        condition: service_healthy
      api-v2:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/radar >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped
