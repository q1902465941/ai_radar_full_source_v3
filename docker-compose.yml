services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      sh -c "python -m alembic upgrade head &&
             gunicorn backend.app.main:app
             -k uvicorn.workers.UvicornWorker
             -b 0.0.0.0:8001
             --workers 2
             --timeout 120"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
