x-ai-radar-runtime-env: &ai-radar-runtime-env
  API_TOKEN: ${API_TOKEN:-}
  MARKET_DATA_MODE: ${MARKET_DATA_MODE:-binance}
  TRADE_MODE: ${TRADE_MODE:-paper}
  AUTO_TRADING_ENABLED: ${AUTO_TRADING_ENABLED:-false}
  AUTO_TRADING_CANDIDATE_MODE: ${AUTO_TRADING_CANDIDATE_MODE:-paper_top}
  AUTO_TRADING_CANDIDATE_MIN_SCORE: ${AUTO_TRADING_CANDIDATE_MIN_SCORE:-70}
  AUTO_TRADING_CANDIDATE_LIMIT: ${AUTO_TRADING_CANDIDATE_LIMIT:-1}
  LIVE_TRADING_ENABLED: ${LIVE_TRADING_ENABLED:-false}
  LIVE_USE_TEST_ORDER: ${LIVE_USE_TEST_ORDER:-true}
  ATTACH_PROTECTION_ORDERS: ${ATTACH_PROTECTION_ORDERS:-true}
  AI_ENABLED: ${AI_ENABLED:-false}
  AI_STRATEGY_PROVIDER: ${AI_STRATEGY_PROVIDER:-rule}
  REQUIRE_CODEX_STRATEGY_FOR_ENTRY: ${REQUIRE_CODEX_STRATEGY_FOR_ENTRY:-false}
  CODEX_COMMAND: ${DOCKER_CODEX_COMMAND:-codex}
  BINANCE_TESTNET: ${BINANCE_TESTNET:-false}
  BINANCE_API_KEY: ${BINANCE_API_KEY:-}
  BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
  BINANCE_RECV_WINDOW: ${BINANCE_RECV_WINDOW:-5000}
  BINANCE_HTTP_TIMEOUT: ${BINANCE_HTTP_TIMEOUT:-8}
  BINANCE_SYMBOL_LIMIT: ${BINANCE_SYMBOL_LIMIT:-80}
  BINANCE_MOVER_SHARE: ${BINANCE_MOVER_SHARE:-0.45}
  BINANCE_ASCII_SYMBOLS_ONLY: ${BINANCE_ASCII_SYMBOLS_ONLY:-true}
  BINANCE_FACTOR_CONCURRENCY: ${BINANCE_FACTOR_CONCURRENCY:-6}
  BINANCE_FACTOR_TTL_SECONDS: ${BINANCE_FACTOR_TTL_SECONDS:-45}
  BINANCE_MARKET_FALLBACK_TESTNET: ${BINANCE_MARKET_FALLBACK_TESTNET:-false}
  BINANCE_WS_ENABLED: ${BINANCE_WS_ENABLED:-true}
  BINANCE_WS_URL: ${BINANCE_WS_URL:-}
  BINANCE_WS_STALE_SECONDS: ${BINANCE_WS_STALE_SECONDS:-10}
  BINANCE_KLINE_INTERVAL: ${BINANCE_KLINE_INTERVAL:-5m}
  BINANCE_KLINE_LIMIT: ${BINANCE_KLINE_LIMIT:-30}
  BINANCE_DEPTH_LIMIT: ${BINANCE_DEPTH_LIMIT:-20}
  BINANCE_OI_PERIOD: ${BINANCE_OI_PERIOD:-5m}
  BINANCE_USE_OPEN_INTEREST_HIST: ${BINANCE_USE_OPEN_INTEREST_HIST:-false}
  BINANCE_USE_TAKER_RATIO_ENDPOINT: ${BINANCE_USE_TAKER_RATIO_ENDPOINT:-false}
  PAPER_PROBE_ENABLED: ${PAPER_PROBE_ENABLED:-true}
  PAPER_PROBE_MIN_SCORE_FLOOR: ${PAPER_PROBE_MIN_SCORE_FLOOR:-18}
  PAPER_PROBE_MIN_FUND_CONFIRM: ${PAPER_PROBE_MIN_FUND_CONFIRM:-1}
  PAPER_PROBE_MIN_DIRECTION_CONFIRMATIONS: ${PAPER_PROBE_MIN_DIRECTION_CONFIRMATIONS:-4}
  PAPER_PROBE_MAX_WICK_RATIO: ${PAPER_PROBE_MAX_WICK_RATIO:-0.55}
  MONITOR_LEGACY_BACKEND_URL: ${MONITOR_LEGACY_BACKEND_URL:-http://backend:8001}
  MONITOR_LEGACY_DB_FALLBACK_ENABLED: ${MONITOR_LEGACY_DB_FALLBACK_ENABLED:-true}
  DB_PATH: ${DOCKER_DB_PATH:-data/ai_radar.db}

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    command:
      - sh
      - -c
      - python -m alembic upgrade head && exec gunicorn backend.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8001 --workers 1 --timeout 300
    environment:
      <<: *ai-radar-runtime-env
      APP_HOST: 0.0.0.0
      APP_PORT: 8001
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/state', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  api-v2:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    command:
      - sh
      - -c
      - exec gunicorn backend.app.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8002 --workers 2 --timeout 120
    environment:
      <<: *ai-radar-runtime-env
      APP_HOST: 0.0.0.0
      APP_PORT: 8002
    ports:
      - "8002:8002"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/api/v2/health', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:24-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.29-alpine}
    depends_on:
      backend:
        condition: service_healthy
      api-v2:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/radar >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped
