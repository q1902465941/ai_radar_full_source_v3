{% extends "layout.html" %}
{% block content %}
<section class="page-head">
  <div>
    <h1>自动交易控制</h1>
    <p>扫描算法、AI 策略生成、策略进化、动态仓位和自动持仓管理。</p>
  </div>
</section>

<section class="panel config-panel">
  <div class="panel-title"><b>控制台认证</b><span id="apiTokenStatus">--</span></div>
  <form id="apiTokenForm" class="config-form" onsubmit="saveApiToken(event)">
    <label>API Token<input id="apiTokenInput" type="password" autocomplete="off" placeholder="API_TOKEN"></label>
    <button class="btn big" type="submit" data-busy-label="保存中...">保存认证</button>
    <button class="btn ghost big" type="button" data-confirm="clear-api-token" data-busy-label="清除中..." onclick="clearApiToken(event)">清除认证</button>
  </form>
</section>

<section class="summary-grid" id="accountBox"></section>

<section class="panel config-panel">
  <div class="panel-title"><b>闭环演练参数</b><span>只跑纸面闭环，不触发真实下单</span></div>
  <form id="autoTradeParamsForm" class="config-form params-form" onsubmit="saveAutoTradeParams(event)">
    <label>候选模式
      <select id="autoCandidateMode">
        <option value="paper_top">Top 热点纸面闭环</option>
        <option value="strict">严格实盘候选</option>
      </select>
    </label>
    <label>最低评分<input id="autoCandidateMinScore" type="number" step="1" min="0" max="100"></label>
    <label>候选数量<input id="autoCandidateLimit" type="number" step="1" min="1" max="10"></label>
    <label>纸面资金 USDT<input id="paperAccountEquity" type="number" step="10" min="1"></label>
    <label>最大持仓数<input id="maxOpenPositions" type="number" step="1" min="1" max="20"></label>
    <label>目标保证金比例<input id="tradeTargetMarginPct" type="number" step="0.001" min="0.001" max="1"></label>
    <label>最大保证金比例<input id="tradeMaxMarginPct" type="number" step="0.001" min="0.001" max="1"></label>
    <label>单笔最大风险比例<input id="tradeMaxRiskPct" type="number" step="0.0001" min="0.0001" max="1"></label>
    <label>最低目标净收益 USDT<input id="tradeMinNetProfitUsdt" type="number" step="0.01" min="0"></label>
    <label>收益覆盖成本倍数<input id="tradeMinProfitCostRatio" type="number" step="0.1" min="0"></label>
    <label>最小保证金<input id="tradeMinMarginUsdt" type="number" step="1" min="0"></label>
    <label>最小名义价值<input id="tradeMinNotionalUsdt" type="number" step="1" min="0"></label>
    <label>保留资金比例<input id="tradeReservedBalancePct" type="number" step="0.001" min="0" max="0.95"></label>
    <label>纸面最低胜率<input id="strategyMinPaperWinRate" type="number" step="0.01" min="0" max="1"></label>
    <label>纸面最低信心<input id="strategyMinPaperConfidence" type="number" step="1" min="0" max="100"></label>
    <label>最低期望R<input id="strategyMinExpectedR" type="number" step="0.01" min="-5" max="5"></label>
    <label>最低TP2 R<input id="strategyMinTp2R" type="number" step="0.1" min="0.1" max="20"></label>
    <label class="checkbox-label"><input id="autoUseActiveStrategyFilter" type="checkbox"> 启用进化策略过滤</label>
    <label class="checkbox-label"><input id="autoUsePerformanceGuard" type="checkbox"> 启用历史绩效保护</label>
    <button class="btn big" type="submit" data-busy-label="保存中...">保存闭环参数</button>
  </form>
</section>

<section class="panel config-panel">
  <div class="panel-title"><b>Binance 主网配置</b><span id="mainnetConfigStatus">--</span></div>
  <form id="mainnetConfigForm" class="config-form" onsubmit="saveMainnetConfig(event)">
    <label>API Key<input id="mainnetApiKey" name="api_key" autocomplete="off" placeholder="Binance Futures API Key"></label>
    <label>API Secret<input id="mainnetApiSecret" name="api_secret" type="password" autocomplete="off" placeholder="Binance Futures API Secret"></label>
    <button class="btn big" type="submit" data-busy-label="保存中...">保存主网配置</button>
  </form>
</section>

<section class="panel">
  <div class="panel-title"><b>策略进化</b><span>历史样本 + 回测 + 样本外验证 + 晋级门</span></div>
  <section class="summary-grid learning-grid" id="learningBox"></section>
  <div class="settings-grid">
    <button class="btn big" type="button" data-busy-label="进化中..." onclick="evolveStrategies(event, false)">本地进化策略</button>
    <button class="btn big" type="button" data-busy-label="验证中..." onclick="paperRepairVerify(event)">纸面数据修复验证</button>
    <button class="btn ghost big" type="button" data-busy-label="生成中..." onclick="evolveStrategies(event, true)">Codex 生成候选并回测</button>
    <button class="btn ghost big" type="button" data-busy-label="刷新中..." onclick="refreshLearning(event)">刷新策略状态</button>
  </div>
</section>

<section class="settings-grid">
  <button class="btn big" type="button" data-action="scan-now" data-busy-label="扫描中..." onclick="scanNow(event)">扫描一次</button>
  <button class="btn big" type="button" data-busy-label="执行中..." onclick="runAutoOnce(event)">AI 自动交易一次</button>
  <button class="btn ghost big" type="button" data-confirm="start-auto-loop" data-busy-label="开启中..." onclick="startAuto(event)">开启自动交易循环</button>
  <button class="btn danger big" type="button" data-confirm="stop-auto-loop" data-busy-label="关闭中..." onclick="stopAuto(event)">关闭自动交易循环</button>
</section>

<pre id="settingsOut" class="output"></pre>
{% endblock %}
{% block scripts %}
<script>
window.PAGE='settings';
refreshApiTokenStatus();
refreshAccount();
refreshMainnetConfig();
refreshLearning();
refreshAutoTradeParams();
setInterval(refreshAccount,5000);
</script>
{% endblock %}
